technical-credibility:
  intro: "the open source record speaks for itself:"
  items:
  - label: 102 published rubygems
    value: 481M+ total downloads
    description: "infrastructure-grade open source used by millions of developers worldwide. open4 (138M), systemu (102M), require_all (86M), macaddr (71M)."
  - label: ruby hero award
    value: railsconf 2014
    description: "recognized for sustained, prolific contribution to the ruby ecosystem. ~150 gems at the time of the award."
  - label: 188 public github repos
    value: 516 followers
    description: "decades of open source work spanning systems programming, web infrastructure, scientific computing, and developer tooling."
  - label: CIRES / NOAA
    value: scientific computing
    description: "built data pipelines and distributed systems at the cooperative institute for research in environmental sciences. unix, systems programming, and computational science before devops was a word."
