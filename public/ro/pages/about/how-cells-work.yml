- step: "idea"
  description: "someone proposes software their business needs — what it does, what they'd pay monthly."
- step: "pledges"
  description: "other businesses with the same need back it with monthly commitments. $25–$500/mo per business."
- step: "threshold"
  description: "when monthly pledges hit $1,000, the idea reaches threshold. pledges lock."
- step: "cell formation"
  description: "the cooperative triggers cell formation. contracts are signed. businesses and the winning cell become equal members of the LCA."
- step: "build + own"
  description: "a certified member cell designs, builds, and operates it. all members vote on priorities. you own what you paid for."
