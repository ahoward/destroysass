dispute-resolution:
- step: '1'
  title: product steward fast-path
  description: "daily operational friction (bug vs feature, scope questions) is resolved by the product steward. fast, no formal process."
- step: '2'
  title: board review
  description: "if the steward's call is contested, the board reviews. cross-cell disputes are resolved through the board with independent technical audit when needed."
- step: '3'
  title: binding arbitration
  description: "all membership agreements include binding arbitration clauses. disputes resolved quickly and affordably, not in court."
- step: '4'
  title: legal standing
  description: "if governance fails, you have standing to enforce your rights. you're a co-owner of a legal entity, not a customer clicking \"I agree.\""
