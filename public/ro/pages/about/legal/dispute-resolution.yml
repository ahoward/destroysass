- step: "1"
  title: "direct communication"
  description: "members and cells resolve issues through direct conversation first. most things get handled here."
- step: "2"
  title: "board mediation"
  description: "if direct communication fails, the board reviews the deliverables against the cell's proposal and budget, and makes a ruling. either party can appeal to a full member vote."
- step: "3"
  title: "legal recourse"
  description: "if governance fails, you have standing to enforce your rights in court. you're a co-owner of a legal entity, not a customer clicking \"I agree.\""
