faq:
- q: "what if I want to leave?"
  a: "fork freedom. the source code is collectively owned — you take it, your data (via self-serve export), and the right to run it yourself or hire any developer to host it for you. you cannot resell or offer it as a hosted service to others."
- q: "who builds the software?"
  a: "certified cell members — small product teams (typically 2–5 people) that handle product, design, engineering, and operations. they're members of the cooperative with the same structural voting rights as businesses. they carry professional liability insurance and must pass quality gates on every release."
- q: "what's the legal structure?"
  a: "a limited cooperative association (LCA). a real legal entity that gives you enforceable contracts, voting rights, and legal standing. structural decisions require both member classes to approve. day-to-day operations are handled by an elected board."
- q: "can I change my pledge amount?"
  a: "yes, until pledges lock at the board-set threshold. during the build phase, pledges are escrowed for the contracted duration. you can always propose additional pledges for feature rounds on existing projects."
- q: "what happens after a cell is selected?"
  a: "the winning cell takes over — product direction, design, development, hosting, and support. a product steward with domain expertise manages scope and priorities on behalf of pledging members. the cell retains full authority over architecture, stack, and implementation."
- q: "is the code open source?"
  a: "no — and that's intentional. the source code is collectively owned by the cooperative, licensed under established source-available frameworks (BSL/FSL). members can read, run, modify, and fork it. non-members cannot. this prevents the 'join, copy, compete' attack that has gutted open-source projects. not open source. not closed source. our source."
- q: "what if no one pledges my idea?"
  a: "it stays visible on the board. share it. rally others. there's no expiration. good ideas find their people."
- q: "how is this different from open source?"
  a: "open source gives you code anyone can take. destroysaas gives you a funded, maintained, hosted product with collectively owned source code, legal protections, collective governance, professional cells with liability insurance, and a reserve fund. you own it without giving it away."
