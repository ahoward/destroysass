how-cells-work:
- step: idea
  description: "someone proposes software their business needs — what it does, what they'd pay monthly."
- step: pledges
  description: "other businesses with the same need back it with monthly commitments."
- step: threshold
  description: "when monthly pledges hit the board-set threshold for that project category, pledges lock."
- step: scope
  description: "the cooperative funds a scoping phase. certified cells submit architecture proposals and cost estimates — paid work, not spec work."
- step: build + own
  description: "a product steward evaluates bids. the winning cell designs, builds, and operates it. the source code is collectively owned. you own what you paid for."
