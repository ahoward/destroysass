title: financial model — destroysaas
description: "how the co-op gets funded, where the money goes, and how surplus is shared. transparent economics for collective software ownership."
heading: the financial model
tagline: "here's exactly where the money goes. no hidden fees. no investor-first economics. one cooperative. two member types. every dollar visible."
cta_text: see how your rights are protected
cta_primary:
  text: the legal model →
  href: /about/legal
cta_secondary:
  text: back to about →
  href: /about
money-in:
- label: monthly dues
  value: all members
  description: "every member — businesses and cells alike — pays monthly dues. this funds operating costs: legal fees, insurance, hosting, platform maintenance, board expenses, the reserve fund, and the core platform (shared infrastructure like authentication, design systems, notifications)."
- label: project pledges
  value: businesses
  description: "businesses pledge toward specific projects on top of dues. pledges are ring-fenced — money pledged for the invoicing tool goes to the invoicing tool, not to general operations. during the build phase, pledges are escrowed for the contracted duration."
- label: access fees
  value: new members
  description: "new members joining existing projects pay an access fee that amortizes the initial build cost. a portion is credited back to the original pledging members, reducing their effective cost over time. cells earn a recurring, vesting share of access fees from projects they built."
money-out:
- label: public budgets
  description: "category-level budget summaries are visible to every member of the cooperative. the board reviews detailed line items. no secret costs, no hidden margins."
- label: auto-approval
  description: "budgets at or below the original bid cap are auto-approved. the board only intervenes on overages or anomalies. no monthly chokepoint."
- label: cell margin
  description: "the cell's margin is the difference between their bid cap and their actual spend. that margin is the cell's money — theirs to keep, no questions asked. cells are rewarded for efficiency."
- label: budget caps
  description: "a cell's monthly budget cannot exceed the project's pledged revenue. the money in caps the money out. if pledges drop below the minimum viable maintenance cost, the board funds from treasury or initiates a deprecation vote."
patronage:
  intro: "the cooperative tracks **patronage** — how much each member has contributed over time. this is standard cooperative practice and determines how year-end surplus gets distributed."
  outro: "the 50/50 split is a starting point. the membership can vote to adjust it. patronage is tracked automatically. no manual accounting."
  items:
  - label: business patronage
    value: dues + pledges
    description: "you contributed money toward operating costs and specific projects — that's your patronage."
  - label: cell patronage
    value: dues + paid budgets
    description: "your dues plus the budgets the cooperative actually paid for your work. based on what was spent, not what was requested."
  - label: surplus split
    value: 50/50
    description: "year-end surplus is split into two pools. 50% to the business pool, distributed pro-rata by each business's total dues + pledges. 50% to the cell pool, distributed pro-rata by each cell's total dues + paid budgets. each class benefits from the value they created."
