flywheel:
- businesses pledge toward projects
- → cells build open-source tools
- → the co-op curates the best ones
- → community members get access
- → members start businesses
- → new businesses fund more development
how-it-works:
- step: '01'
  title: members fund development
  body: "businesses propose ideas and pledge toward specific projects. cells (product teams) bid on the work and build it. all members pay dues. all code is open source."
- step: '02'
  title: the co-op curates the best tools
  body: "not everything makes the cut. destroysaas identifies the most useful, most stable tools the cooperative produces — the ones with broad appeal beyond the original sponsors."
- step: '03'
  title: community members get access
  body: "the co-op runs separate public instances of the curated tools. you join, you get in. same codebase, different infrastructure. no mixing with business data."
what-members-get:
- title: access to the tools
  description: "the full product. not a limited tier, not a freemium gate. the same software the businesses use, running on co-op-hosted infrastructure. we're a cooperative, not a SaaS company with extra steps."
- title: a vote
  description: "governance voice on cooperative-wide decisions. board elections, policy, direction. one member, one vote. not weighted by how much you pay."
- title: full transparency
  description: "every dollar in, every dollar out. cell performance, financials, decisions — all public. you see what your membership funds."
- title: a pipeline
  description: "if you start a business and need dedicated infrastructure, you're already in the cooperative. upgrade from community to a full business membership with a dedicated instance, SLA, and support."
