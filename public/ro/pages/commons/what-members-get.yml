- title: "access to the tools"
  description: "the full product. not a limited tier, not a freemium gate. the same software the businesses use, running on co-op-hosted infrastructure. we're a cooperative, not a SaaS company with extra steps."
- title: "a vote"
  description: "governance voice on cooperative-wide decisions. board elections, policy, direction. one member, one vote. not weighted by how much you pay."
- title: "full transparency"
  description: "every dollar in, every dollar out. cell performance, financials, decisions — all public. you see what your membership funds."
- title: "a pipeline"
  description: "if you start a business and need dedicated infrastructure, you're already in the cooperative. upgrade from community to a full business membership with a dedicated instance, SLA, and support."
